<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="color-scheme" content="dark">
    <link rel="icon" type="image/webp" href="assets/images/logos/zane.webp">
    <title>监狱重工 - 重工业务产品线</title>

    <!-- 本地字体 -->
    <link href="css/fonts.css" rel="stylesheet"/>
    <link href="css/icons.css" rel="stylesheet"/>

    <!-- Tailwind CSS -->
    <script src="css/tailwind.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "var(--color-primary)",
                        "primary-dim": "var(--color-primary-dim)",
                        "background-light": "#f0f0f0",
                        "background-dark": "#121214",
                        "surface-dark": "#1c1c1f",
                        "surface-highlight": "#252529",
                        "accent-gray": "#333336",
                        "text-muted": "#a0a0a5",
                    },
                    fontFamily: {
                        "display": ["Noto Serif SC", "serif"],
                        "body": ["Noto Sans SC", "sans-serif"],
                    },
                    boxShadow: {
                        'soft': '0 20px 40px -15px rgba(0, 0, 0, 0.5)',
                        'inner-glow': 'inset 0 0 20px rgba(var(--color-primary-rgb), 0.05)',
                    },
                    borderRadius: {
                        "DEFAULT": "2px",
                        "lg": "4px",
                        "xl": "6px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>

    <!-- 自定义样式 -->
    <link href="css/custom.css" rel="stylesheet"/>
    <style>
        /* 产品页专用样式 */
        .hero-pattern {
            background-color: #121214;
            background-image: radial-gradient(#252529 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(var(--color-primary-rgb), 0.2);
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(var(--color-primary-rgb), 0.4);
        }
        /* 移动端横向滚动条 */
        #mobile-series-selector::-webkit-scrollbar {
            height: 2px;
        }
        #mobile-series-selector::-webkit-scrollbar-track {
            background: transparent;
        }
        #mobile-series-selector::-webkit-scrollbar-thumb {
            background: rgba(var(--color-primary-rgb), 0.3);
            border-radius: 1px;
        }
        /* 系列按钮样式 */
        .series-btn .series-inner {
            height: 120px;
        }
        .series-btn.series-active .series-inner {
            height: 180px;
        }
        .series-btn.series-active {
            background: rgba(var(--color-primary-rgb), 0.05);
        }
        .series-btn.series-active h3 {
            color: white;
        }
        .series-btn.series-active span:first-child {
            color: var(--color-primary);
        }
        .series-btn:hover img,
        .series-btn.series-active img {
            filter: saturate(1) contrast(1.25) !important;
        }
    </style>
</head>

<body class="bg-background-dark text-gray-100 font-body md:overflow-hidden md:h-screen overflow-x-hidden">
<div class="flex flex-col md:h-full">

    <!-- ========================================
         导航栏
         ======================================== -->
    <nav class="fixed top-0 left-0 w-full z-50 bg-background-dark/95 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center justify-between px-4 sm:px-6 md:px-8 py-4 md:py-5 max-w-[1600px] mx-auto w-full">
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-3">
                <img src="assets/images/logos/zane.webp" alt="ZANE Logo" class="h-6 w-auto opacity-90 logo-invert">
                <h2 class="text-white text-lg font-display font-bold tracking-[0.05em]">监狱重工 ZANE</h2>
            </a>

            <!-- 桌面端导航 -->
            <div class="hidden md:flex flex-1 justify-end gap-12 items-center">
                <div class="flex items-center gap-12">
                    <a class="text-gray-400 hover:text-white text-sm font-medium tracking-wider transition-colors duration-300" href="index.html">主页</a>
                    <a class="text-white text-sm font-medium tracking-wider transition-colors duration-300 border-b border-primary pb-1" href="products.html">监狱重工</a>
                    <a class="text-gray-400 hover:text-white text-sm font-medium tracking-wider transition-colors duration-300" href="transport.html">监狱运输</a>
                    <a class="text-gray-400 hover:text-white text-sm font-medium tracking-wider transition-colors duration-300" href="featured.html">旗舰序列</a>
                    <a class="text-gray-400 hover:text-white text-sm font-medium tracking-wider transition-colors duration-300" href="about.html">基地信息</a>
                </div>
                <div class="h-4 w-px bg-white/10"></div>
                <button class="text-xs font-medium tracking-widest text-primary hover:text-white transition-colors uppercase">
                    客户登录
                </button>
            </div>

            <!-- 移动端菜单按钮 -->
            <button id="mobile-menu-btn" aria-label="打开菜单" class="md:hidden p-2 -mr-2 text-white/80 hover:text-white transition-colors">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </div>

        <!-- 移动端菜单 -->
        <div id="mobile-menu" class="hidden md:hidden bg-background-dark border-t border-white/5 px-4 sm:px-6 py-4">
            <div class="flex flex-col gap-4">
                <a class="text-gray-400 hover:text-white text-sm py-3" href="index.html">主页</a>
                <a class="text-white text-sm py-3 border-l-2 border-primary pl-4" href="products.html">监狱重工</a>
                <a class="text-gray-400 hover:text-white text-sm py-3" href="transport.html">监狱运输</a>
                <a class="text-gray-400 hover:text-white text-sm py-3" href="featured.html">旗舰序列</a>
                <a class="text-gray-400 hover:text-white text-sm py-3" href="about.html">基地信息</a>
            </div>
        </div>
    </nav>

    <!-- ========================================
         主内容区（侧边栏+产品列表）
         ======================================== -->
    <main class="flex-1 flex md:overflow-hidden pt-[80px] md:min-h-0">

        <!-- 侧边栏：系列导航 -->
        <aside class="hidden md:flex w-1/3 lg:w-1/4 xl:w-1/5 border-r border-white/5 bg-surface-dark flex-col overflow-y-auto custom-scroll">
            <!-- 侧边栏标题 -->
            <div class="p-8 border-b border-white/5">
                <div class="flex items-center gap-3 mb-2">
                    <span class="h-px w-6 bg-primary"></span>
                    <span class="text-primary font-bold text-[11px] tracking-[0.2em] uppercase">Division Selection</span>
                </div>
                <div class="flex items-center justify-between">
                    <h1 class="text-2xl font-display text-white tracking-wide">重工业务</h1>
                    <img src="assets/images/logos/znhi.webp" alt="ZNHI Logo" class="h-8 w-auto opacity-40 logo-invert">
                </div>
            </div>

            <!-- 系列列表（动态渲染） -->
            <nav id="series-list-container" class="flex-grow">
                <!-- 内容由 JS 动态渲染 -->
            </nav>
        </aside>

        <!-- 产品列表区域 -->
        <section class="flex-grow bg-background-dark md:overflow-y-auto custom-scroll px-6 md:px-12 py-6 md:py-12 overflow-x-hidden">
            <!-- 移动端系列选择器 -->
            <div class="md:hidden mb-6 -mx-6 relative">
                <!-- 滚动容器 -->
                <div id="mobile-series-selector" class="border-b border-white/5 overflow-x-auto overflow-y-hidden max-w-[100vw]">
                    <div class="flex items-center gap-2 pb-4 px-6 w-max min-w-0">
                        <!-- 内容由 JS 动态渲染 -->
                    </div>
                </div>
                <!-- 右侧渐变 + 按钮 -->
                <div id="scroll-hint-right" class="absolute right-0 top-0 bottom-2 flex items-center transition-opacity duration-200">
                    <div class="w-12 h-full bg-gradient-to-r from-transparent to-background-dark pointer-events-none"></div>
                    <button id="scroll-right-btn" class="px-2 py-2 bg-background-dark text-gray-400 hover:text-primary active:scale-95 transition-all" aria-label="向右滚动">
                        <span class="material-symbols-outlined text-2xl">chevron_right</span>
                    </button>
                </div>
                <!-- 左侧渐变 + 按钮 -->
                <div id="scroll-hint-left" class="absolute left-0 top-0 bottom-2 flex items-center transition-opacity duration-200 opacity-0 pointer-events-none">
                    <button id="scroll-left-btn" class="px-2 py-2 bg-background-dark text-gray-400 hover:text-primary active:scale-95 transition-all" aria-label="向左滚动">
                        <span class="material-symbols-outlined text-2xl">chevron_left</span>
                    </button>
                    <div class="w-12 h-full bg-gradient-to-l from-transparent to-background-dark pointer-events-none"></div>
                </div>
            </div>

            <div class="max-w-5xl mx-auto">
                <!-- 列表标题 -->
                <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12 border-b border-white/5 pb-8">
                    <div>
                        <h2 id="list-title" class="text-2xl md:text-3xl font-display text-white mb-2">正在查看：全部产品</h2>
                        <p id="list-desc" class="text-text-muted text-sm max-w-xl">ZNHI 品牌的全部产品线</p>
                    </div>
                    <div class="flex gap-4">
                        <button id="filter-btn" aria-label="筛选产品" class="p-3 border border-white/10 hover:border-primary/50 transition-colors text-gray-500 hover:text-primary">
                            <span class="material-symbols-outlined">filter_list</span>
                        </button>
                    </div>
                </div>

                <!-- 当前筛选条件显示 -->
                <div id="active-filters" class="hidden mb-6 flex flex-wrap gap-2">
                    <!-- 内容由 JS 动态渲染 -->
                </div>

                <!-- 产品列表（动态渲染） -->
                <div id="products-list-container" class="space-y-12">
                    <!-- 内容由 JS 动态渲染 -->
                </div>

                <!-- 页脚（在滚动区域内，滚到底才可见） -->
                <footer class="mt-24 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="flex items-center gap-6">
                        <p class="text-gray-600 text-[11px] tracking-wider uppercase">© 2042 ZANE HEAVY INDUSTRIES.</p>
                        <div class="hidden md:flex gap-6">
                            <a class="text-[11px] text-gray-500 hover:text-white transition-colors uppercase tracking-widest" href="legal.html?section=privacy">隐私协议</a>
                            <a class="text-[11px] text-gray-500 hover:text-white transition-colors uppercase tracking-widest" href="legal.html?section=security">安全合规</a>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] text-primary/60 font-mono tracking-tighter">SECURE CONNECTION // ENCRYPTED</span>
                        <div class="h-1 w-12 bg-primary/20 rounded-full overflow-hidden">
                            <div class="h-full bg-primary w-1/2"></div>
                        </div>
                    </div>
                </footer>
            </div>
        </section>

    </main>

</div>

<!-- 筛选面板遮罩 -->
<div id="filter-overlay" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-40" style="transition: opacity 0.3s ease;"></div>

<!-- 筛选面板（移动端底部抽屉 / 桌面端居中浮动） -->
<div id="filter-panel" class="hidden fixed inset-x-0 bottom-0 md:inset-auto md:left-1/2 md:-translate-x-1/2 md:top-40 w-full md:max-w-4xl bg-surface-dark border-t md:border border-white/10 md:rounded-lg shadow-2xl z-50 max-h-[80vh] md:max-h-[calc(100vh-12rem)] overflow-y-auto">
    <div class="p-4 md:p-6">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-primary">filter_list</span>
                <h3 class="text-lg font-display text-white">按类型筛选</h3>
            </div>
            <button id="filter-close-btn" aria-label="关闭筛选面板" class="text-gray-500 hover:text-white transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <!-- 筛选选项容器（动态生成） -->
        <div id="filter-options-container" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
            <!-- 内容由 JS 动态渲染 -->
        </div>

        <!-- 操作按钮 -->
        <div class="flex gap-4 pt-4 border-t border-white/5">
            <button id="filter-apply-btn" class="flex-1 bg-primary hover:brightness-110 active:brightness-90 active:scale-[0.98] text-white py-3 text-sm font-bold tracking-wider uppercase transition-all duration-150">
                应用筛选
            </button>
            <button id="filter-clear-btn" class="px-6 border border-white/10 hover:border-white/30 hover:text-white active:brightness-90 active:scale-[0.98] text-gray-400 py-3 text-sm font-bold tracking-wider uppercase transition-all duration-150">
                清除
            </button>
        </div>
    </div>
</div>

<!-- 基础工具脚本 -->
<script src="js/url-utils.js"></script>
<script src="js/products-data.js" onerror=""></script><!-- 本地预览用，HTTP 环境可忽略 -->
<script src="js/data-loader.js"></script>
<script src="js/renderer.js"></script>
<script src="js/mobile-scroll-hints.js"></script>

<!-- 页面特定脚本 -->
<script src="js/products-page.js"></script>

<!-- 公共交互脚本 -->
<script src="js/main.js"></script>
</body>
</html>
